name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Secrets-scrub grep gate (r6 security must-do 1).
  # .env.example must not contain v1+ secret names until the feature PR that
  # wires them in lands with its own security review.
  # ==========================================================================
  env-example-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if v1+ secrets leaked into .env.example
        run: |
          # Match actual env-var assignments (KEY= or KEY at start of line),
          # not prose in comments. Keeps the scrub precise so explanatory
          # text can still reference the v1+ names.
          if grep -qE '^\s*(ASSEMBLYAI[A-Z_]*|DISCORD[A-Z_]*|VAPID[A-Z_]*)\s*=' .env.example; then
            echo "::error::.env.example contains v1+ secret ASSIGNMENTS (ASSEMBLYAI_.../DISCORD_.../VAPID_...). Remove them and re-add in the PR that implements the feature."
            grep -nE '^\s*(ASSEMBLYAI[A-Z_]*|DISCORD[A-Z_]*|VAPID[A-Z_]*)\s*=' .env.example || true
            exit 1
          fi

  # ==========================================================================
  # Lint + typecheck + unit tests (vitest) across every workspace package.
  # Fails fast on any new high/critical npm audit advisory.
  # ==========================================================================
  validate:
    runs-on: ubuntu-latest
    needs: [env-example-scrub]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit (prod deps only)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (vitest)
        # Tee output for the silent-skip guardrail step that follows.
        # set -o pipefail preserves pnpm's exit code through the pipe.
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/vitest-output.log

      - name: Verify expected test files were executed (council r5 [security] + #52)
        # Asserts that specific test files appear in vitest's per-file
        # output line. Catches the silent-skip class that bit PR #48
        # (apps/web/app/review/actions.test.ts was missed by the include
        # glob and 16 tests ran zero times). Issue #52 will replace this
        # ad-hoc list with a generated manifest; until then this is the
        # explicit allowlist for high-leverage suites.
        run: |
          # Test FILE names only (vitest's per-file output line). Source
          # modules like ingest-pdf-persist.ts are covered by their
          # adjacent *.test.ts file (ingest-pdf.test.ts in that case),
          # so listing them here would always fail — they don't appear
          # as standalone entries in vitest output.
          EXPECTED=(
            "ingest-pdf.test.ts"
            "chunker.test.ts"
            "voyage.test.ts"
            "flashcard-gen.test.ts"
            "review/actions.test.ts"
          )
          missing=0
          for name in "${EXPECTED[@]}"; do
            if ! grep -q "$name" /tmp/vitest-output.log; then
              echo "::error::Expected test file or module \"$name\" did not appear in vitest output (silently skipped?)"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing expected test file(s) missing from vitest scope"
            exit 1
          fi
          echo "All ${#EXPECTED[@]} expected test files were executed."

      - name: Prompt evals
        run: pnpm eval

  # ==========================================================================
  # Database tests (pgTAP) against a fresh local Supabase instance.
  # Covers every RLS policy, the concept_links integrity trigger, Storage
  # path-convention drift, and the Realtime publication lockfile.
  # ==========================================================================
  db-tests:
    runs-on: ubuntu-latest
    needs: [validate]
    # v0 TODO (issue #7): flip to blocking once pgTAP fixtures run clean in
    # CI. The suite is the canonical RLS / trigger / publication-lockfile
    # gate and must pass locally (`supabase test db`) for schema-affecting
    # changes. Kept running but non-blocking in CI so a fixture-setup bug
    # doesn't hold the whole PR; local runs catch real RLS regressions in
    # the meantime.
    #
    # PR #54 try-split investigation (2026-04-26): postgres-expert review
    # diagnosed SQLSTATE 42601 on migration 4 as a supabase CLI statement-
    # splitter quirk. Splitting file 4's GRANT into a separate file (see
    # 20260426000003) advanced the failure past the splitter; next blocker
    # was supabase_pooler (supavisor) container failing to bring up its
    # ulimit on the runner. Both fixes ultimately deferred to a dedicated
    # #7 PR — the work-effort vs progress-on-#39 tradeoff didn't justify
    # iterating CI on this PR. See issue #7 for the diagnosis details.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # Official Supabase CLI installer — handles release-asset naming
      # (the .deb filename embeds the version, so downloading via the
      # generic /latest/download/... path yields a 404).
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Apply migrations
        run: supabase db reset --no-seed
      - name: Run pgTAP
        run: supabase test db

  # ==========================================================================
  # A11y regression (r5 a11y must-dos: color-contrast + focus-visible +
  # target-size). Runs only if the web app builds.
  # ==========================================================================
  a11y:
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      # v0 a11y smoke spec uses page.setContent() with inline HTML and
      # does not require the Next.js dev server. When the smoke spec is
      # upgraded to page.goto('/'), re-add a build + start-server step
      # with real env or mocked bindings. Skipping the build keeps the
      # v0 CI fast and deterministic.
      - name: Run axe-core a11y spec
        run: pnpm test:a11y
