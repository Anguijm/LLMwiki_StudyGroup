name: PR Watcher

# Claude-powered PR triage — read-only reviewer.
# Demoted from "code committer" to "review-comment writer" per the 2026-04-17
# Gemini council run (Security/Bugs angles flagged unacceptable risk on
# contents: write). Scope policy lives in .github/claude-pr-watcher-prompt.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]

concurrency:
  group: pr-watch-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_suite.id }}
  cancel-in-progress: true

# Least privilege. Read-only on contents; write on PR/issue threads only so the
# watcher can leave review comments and suggestions (which GitHub treats as a
# PR-level write, not a contents write).
permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Self-recursion guard + trigger allowlist.
    if: |
      vars.PR_WATCHER_ENABLED == 'true' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'pull_request') ||
        (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
        (github.event_name == 'pull_request_review_comment' &&
          (github.event.comment.user.login == 'chatgpt-codex-connector[bot]' ||
           contains(github.event.comment.body, '@claude') ||
           contains(github.event.comment.body, '@Claude'))) ||
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          (startsWith(github.event.comment.body, '@claude') ||
           startsWith(github.event.comment.body, '@Claude'))) ||
        (github.event_name == 'check_suite' &&
          github.event.check_suite.conclusion == 'failure' &&
          github.event.check_suite.pull_requests[0] != null)
      )
    steps:
      # For issue_comment / check_suite / review events the default ref is the
      # base branch, not the PR head. Resolve the PR number and check it out
      # via gh pr checkout so the watcher always sees the right code.
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request|pull_request_review|pull_request_review_comment)
              echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              ;;
            issue_comment)
              echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              ;;
            check_suite)
              NUM=$(jq -r '.check_suite.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
              if [ -z "$NUM" ]; then
                echo "No PR attached to this check_suite; exiting."
                exit 0
              fi
              echo "number=$NUM" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}"
              exit 1
              ;;
          esac

      - name: Checkout repo (any ref)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out PR head
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "${{ steps.pr.outputs.number }}"

      - name: Circuit breaker
        id: halt
        run: |
          if [ -f .harness_halt ]; then
            REASON=$(cat .harness_halt)
            echo "halt_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "halted=true" >> "$GITHUB_OUTPUT"
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment halt reason
        if: steps.halt.outputs.halted == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body "PR watcher skipped — circuit breaker active (\`.harness_halt\` present). Reason: ${{ steps.halt.outputs.halt_reason }}"

      - name: Monthly budget check
        if: steps.halt.outputs.halted != 'true'
        id: budget
        env:
          MONTHLY_CAP: 150
        run: python3 .harness/scripts/pr_watcher_budget.py

      - name: Run Claude watcher (read-only)
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        # Pinned to commit SHA (supply-chain guard) — currently resolves to tag v1.
        uses: anthropics/claude-code-action@496f0537244eccbaa9b0eeff94084c64e1fe6a56
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/claude-pr-watcher-prompt.md
          model: claude-haiku-4-5-20251001
          max_turns: 8
          trigger_phrase: "@claude"
          # Read-only tool allowlist. No Edit, no Write, no Bash(git:*) that
          # could push. npm scripts are fine (they do not mutate the remote).
          allowed_tools: "Bash(npm run lint),Bash(npm run typecheck),Bash(npm test),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*GET*),Read,Grep,Glob"
