name: PR Watcher

# Claude-powered PR triage — read-only reviewer.
# Demoted from "code committer" to "review-comment writer" per the 2026-04-17
# Gemini council run. Scope policy lives in .github/claude-pr-watcher-prompt.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]

# Concurrency group is ALWAYS keyed on the PR number (never check_suite.id)
# so rapid events for the same PR serialize correctly. See council round 2.
concurrency:
  group: pr-watch-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_suite.pull_requests[0].number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      vars.PR_WATCHER_ENABLED == 'true' &&
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'pull_request') ||
        (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
        (github.event_name == 'pull_request_review_comment' &&
          (github.event.comment.user.login == 'chatgpt-codex-connector[bot]' ||
           contains(github.event.comment.body, '@claude') ||
           contains(github.event.comment.body, '@Claude'))) ||
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          (startsWith(github.event.comment.body, '@claude') ||
           startsWith(github.event.comment.body, '@Claude'))) ||
        (github.event_name == 'check_suite' &&
          github.event.check_suite.conclusion == 'failure' &&
          github.event.check_suite.pull_requests[0] != null)
      )
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request|pull_request_review|pull_request_review_comment)
              echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              ;;
            issue_comment)
              echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              ;;
            check_suite)
              NUM=$(jq -r '.check_suite.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
              if [ -z "$NUM" ]; then
                echo "No PR attached to this check_suite; exiting."
                exit 0
              fi
              echo "number=$NUM" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}"
              exit 1
              ;;
          esac

      - name: Compute month key
        id: month
        run: echo "key=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      # Budget state lives in the GitHub Actions cache, NOT in a repo file.
      # This closes the Denial-of-Wallet vector: a PR cannot modify the cache.
      - name: Restore budget counter
        id: budget-restore
        uses: actions/cache/restore@v4
        with:
          path: .budget
          key: pr-watch-budget-${{ steps.month.outputs.key }}-latest
          restore-keys: |
            pr-watch-budget-${{ steps.month.outputs.key }}-

      - name: Read budget
        id: budget
        env:
          MONTHLY_CAP: 150
        run: |
          mkdir -p .budget
          COUNT=$(cat .budget/count 2>/dev/null || echo 0)
          echo "used=$COUNT" >> "$GITHUB_OUTPUT"
          echo "cap=$MONTHLY_CAP" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge "$MONTHLY_CAP" ]; then
            echo "over_budget=true" >> "$GITHUB_OUTPUT"
          else
            echo "over_budget=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo (any ref)
        if: steps.budget.outputs.over_budget != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out PR head
        if: steps.budget.outputs.over_budget != 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "${{ steps.pr.outputs.number }}"

      - name: Circuit breaker
        id: halt
        if: steps.budget.outputs.over_budget != 'true'
        run: |
          if [ -f .harness_halt ]; then
            REASON=$(cat .harness_halt)
            echo "halt_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "halted=true" >> "$GITHUB_OUTPUT"
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment halt reason
        if: steps.halt.outputs.halted == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body "PR watcher skipped — circuit breaker active (\`.harness_halt\` present). Reason: ${{ steps.halt.outputs.halt_reason }}"

      - name: Comment over-budget
        if: steps.budget.outputs.over_budget == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" \
            --body "PR watcher skipped — monthly cap reached (${{ steps.budget.outputs.used }}/${{ steps.budget.outputs.cap }}). Wait until next month or raise the cap in \`.github/workflows/pr-watch.yml\`."

      - name: Run Claude watcher (read-only)
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        # Pinned to commit SHA (supply-chain guard) — currently resolves to tag v1.
        uses: anthropics/claude-code-action@496f0537244eccbaa9b0eeff94084c64e1fe6a56
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/claude-pr-watcher-prompt.md
          # claude-haiku-4-5-20251001 = Haiku 4.5 dated release.
          # Verified against Anthropic model catalog on 2026-04-17.
          # To upgrade, walk .harness/model-upgrade-audit.md.
          model: claude-haiku-4-5-20251001
          max_turns: 8
          trigger_phrase: "@claude"
          # Read-only tool allowlist. No Edit, no Write, no Bash(git:*) that
          # could push. npm scripts are fine (they do not mutate the remote).
          allowed_tools: "Bash(npm run lint),Bash(npm run typecheck),Bash(npm test),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*GET*),Read,Grep,Glob"

      - name: Increment budget counter
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        run: |
          mkdir -p .budget
          CURR=$(cat .budget/count 2>/dev/null || echo 0)
          echo $((CURR + 1)) > .budget/count

      - name: Save budget counter
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        uses: actions/cache/save@v4
        with:
          path: .budget
          # Unique key per run so saves don't collide. Restore picks the
          # latest via the restore-keys prefix above.
          key: pr-watch-budget-${{ steps.month.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}
