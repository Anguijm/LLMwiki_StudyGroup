name: PR Watcher

# Claude-powered PR triage. Responds to Codex review comments and CI failures,
# pushes fix commits when confident, asks the human when ambiguous.
# Scope policy lives in .github/claude-pr-watcher-prompt.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

concurrency:
  group: pr-watch-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # SAFETY GATE: the watcher is disabled by default. To enable it, set the
    # repository variable PR_WATCHER_ENABLED to "true":
    #   Settings → Secrets and variables → Actions → Variables → New repository variable
    # This gate exists because autonomous-PR-editing is a blast-radius decision
    # that deserves an explicit, visible toggle, not just "the file exists".
    if: |
      vars.PR_WATCHER_ENABLED == 'true' && (
        (github.event_name == 'pull_request') ||
        (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
        (github.event_name == 'pull_request_review_comment' &&
          (github.event.comment.user.login == 'chatgpt-codex-connector[bot]' ||
           contains(github.event.comment.body, '@claude'))) ||
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          startsWith(github.event.comment.body, '@claude'))
      )
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.event.pull_request.head.ref || github.ref }}

      - name: Circuit breaker
        id: halt
        shell: bash
        run: |
          if [ -f .harness_halt ]; then
            REASON=$(cat .harness_halt)
            echo "halt_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "halted=true" >> "$GITHUB_OUTPUT"
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment halt reason
        if: steps.halt.outputs.halted == 'true' && github.event.pull_request.number != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "PR watcher skipped — circuit breaker active (\`.harness_halt\` present). Reason: ${{ steps.halt.outputs.halt_reason }}"

      - name: Monthly budget check
        if: steps.halt.outputs.halted != 'true'
        id: budget
        shell: bash
        env:
          MONTHLY_CAP: 150
        run: python3 .harness/scripts/pr_watcher_budget.py

      - name: Run Claude watcher
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/claude-pr-watcher-prompt.md
          model: claude-haiku-4-5-20251001
          max_turns: 12
          trigger_phrase: "@claude"
          allowed_tools: "Bash(git:*),Bash(npm run lint),Bash(npm run typecheck),Bash(npm test),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Edit,Grep,Glob"

      - name: Append run to yolo_log
        if: always() && steps.halt.outputs.halted != 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TRIGGER: ${{ github.event_name }}
          OVER_BUDGET: ${{ steps.budget.outputs.over_budget }}
        run: bash .harness/scripts/log_pr_watch.sh

      - name: Commit watcher log
        if: always() && steps.halt.outputs.halted != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet .harness/yolo_log.jsonl .harness/session_state.json 2>/dev/null; then
            git config user.name "pr-watcher[bot]"
            git config user.email "pr-watcher@users.noreply.github.com"
            git add .harness/yolo_log.jsonl .harness/session_state.json
            git commit -m "chore(watcher): append pr_watch_run log [skip ci]"
            git push || echo "[watcher] push failed (likely protected branch or stale ref); continuing."
          fi
