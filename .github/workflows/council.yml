name: Council Review (Gemini)

# Runs the Gemini multi-persona council on every PR and posts the Lead Architect
# synthesis as a single (re-edited) PR comment. Lets you approve from your phone:
# read the comment, type "approved" to me in chat, I execute.
#
# Setup:
#   1. Add GEMINI_API_KEY as a repo secret (Settings → Secrets → Actions).
#   2. Open or push to a PR. The action runs and comments.
#
# Cost: ~7 Gemini-2.5-pro calls per PR. With ~10 PRs/month → ~$1–3/month.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: council-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  council:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip when title or commits opt out, and when from a fork (secrets unavailable).
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.title, '[skip council]')
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Circuit breaker
        id: halt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -f .harness_halt ]; then
            REASON=$(cat .harness_halt)
            echo "halted=true" >> "$GITHUB_OUTPUT"
            if [ -n "$PR" ]; then
              gh pr comment "$PR" --body "Council skipped — circuit breaker active (\`.harness_halt\`). Reason: $REASON"
            fi
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify GEMINI_API_KEY secret
        if: steps.halt.outputs.halted != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            MSG="Council action could not run: \`GEMINI_API_KEY\` secret is not set. Add it at Settings → Secrets and variables → Actions."
            if [ -n "$PR" ]; then
              gh pr comment "$PR" --body "$MSG"
            fi
            echo "::error::$MSG"
            exit 1
          fi

      - name: Setup Python
        if: steps.halt.outputs.halted != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: .harness/scripts/requirements.txt

      - name: Install council deps
        if: steps.halt.outputs.halted != 'true'
        run: pip install -r .harness/scripts/requirements.txt

      - name: Monthly budget check
        if: steps.halt.outputs.halted != 'true'
        id: budget
        env:
          MONTHLY_CAP: 60
        run: python3 .harness/scripts/council_budget.py

      - name: Comment when over budget
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "${PR:-}" ]; then
            gh pr comment "$PR" --body "Council skipped — monthly run cap reached (${{ steps.budget.outputs.used }}/${{ steps.budget.outputs.cap }}). Raise \`MONTHLY_CAP\` in \`.github/workflows/council.yml\` or wait until next month."
          fi

      - name: Run council
        if: steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        # No || fallbacks. If council.py fails, the job fails — loud and
        # visible in the Actions UI. The post-comment step still runs in
        # the always() block below so the human sees what happened.
        run: python3 .harness/scripts/council.py --diff --base "$BASE_REF"

      - name: Post or update council comment
        if: always() && steps.halt.outputs.halted != 'true' && steps.budget.outputs.over_budget != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER='<!-- council-report -->'
          BODY_FILE="$(mktemp)"
          {
            echo "$MARKER"
            echo
            if [ -f .harness/last_council.md ]; then
              cat .harness/last_council.md
            else
              echo "Council failed to produce a report. See [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            fi
            echo
            echo "---"
            echo "_Auto-posted by \`.github/workflows/council.yml\`. Add \`[skip council]\` to PR title to bypass next push._"
          } > "$BODY_FILE"

          if [ -z "${PR:-}" ]; then
            echo "Not a PR context (workflow_dispatch?). Skipping comment."
            exit 0
          fi

          # Find an existing council comment. `gh api` failures here are real
          # auth / API problems and should fail the step; do not swallow with `|| true`.
          EXISTING_ID="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)"

          if [ -n "$EXISTING_ID" ]; then
            jq -Rs '{body: .}' < "$BODY_FILE" \
              | gh api "repos/$REPO/issues/comments/$EXISTING_ID" --method PATCH --input -
            echo "Updated existing council comment $EXISTING_ID."
          else
            gh pr comment "$PR" --body-file "$BODY_FILE"
            echo "Posted new council comment."
          fi
